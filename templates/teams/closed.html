{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="text-center glass-card-static p-12 rounded-2xl max-w-md">
    <i data-lucide="lock" class="w-16 h-16 mx-auto mb-4 text-red-400"></i>
    <h2 class="text-2xl font-bold mb-3" style="font-family:Poppins;">Selection Closed</h2>
    <p class="text-gray-400 mb-6" style="font-family:Inter;">Team selection for <strong>{{ tournament.name }}</strong> is now closed.</p>
    <a href="/tournament/{{ tournament.id }}/leaderboard/" class="btn-primary">View Leaderboard</a>
  </div>
</div>
{% endblock %}
