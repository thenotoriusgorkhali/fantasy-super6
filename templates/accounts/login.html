{% extends 'base.html' %}
{% block title %}Login — Fantasy Super 6{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 cricket-bg cricket-field-pattern">
  
  <!-- Background blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full opacity-5" style="background:radial-gradient(circle,#00e676,transparent);filter:blur(50px);"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full opacity-4" style="background:radial-gradient(circle,#00bcd4,transparent);filter:blur(60px);"></div>
  </div>
  
  <div class="relative z-10 w-full max-w-md">
    
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:linear-gradient(135deg,#00e676,#00bcd4);">
        <span style="font-size:28px;">⚡</span>
      </div>
      <h1 class="text-3xl font-black gradient-text" style="font-family:Poppins;">Fantasy Super 6</h1>
      <p class="text-gray-400 mt-2 text-sm" style="font-family:Inter;">Welcome back! Sign in to your account.</p>
    </div>
    
    <!-- Card -->
    <div class="glass-card-static p-8 rounded-2xl">
      <h2 class="text-xl font-bold mb-6" style="font-family:Poppins;">Sign In</h2>
      
      <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2" style="font-family:Inter;">Username or Email</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
            <input type="text" name="username" required autocomplete="username"
                   class="input-field pl-11" placeholder="your username">
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2" style="font-family:Inter;">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
            <input type="password" name="password" required autocomplete="current-password"
                   class="input-field pl-11" placeholder="••••••••">
          </div>
        </div>
        
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember" class="rounded border-gray-600" style="accent-color:#00e676;">
            <span class="text-sm text-gray-400" style="font-family:Inter;">Remember me</span>
          </label>
        </div>
        
        <button type="submit" class="btn-primary w-full justify-center text-base py-3">
          <i data-lucide="log-in" class="w-5 h-5"></i> Sign In
        </button>
      </form>
      
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500" style="font-family:Inter;">
          Don't have an account? 
          <a href="/register/" class="font-semibold transition-colors" style="color:#00e676;">Create one →</a>
        </p>
      </div>
    </div>
    
  </div>
</div>
{% endblock %}
