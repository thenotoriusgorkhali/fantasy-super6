{% extends 'base.html' %}
{% block title %}{{ tournament.name }} — Fantasy Super 6{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-12">
  <div class="glass-card-static rounded-2xl p-8 text-center">
    <h1 class="text-3xl font-black mb-4 gradient-text" style="font-family:Poppins;">{{ tournament.name }}</h1>
    <p class="text-gray-400 mb-8" style="font-family:Inter;">{{ tournament.team_a_name }} vs {{ tournament.team_b_name }}</p>
    <div class="flex gap-4 justify-center flex-wrap">
      {% if tournament.is_open %}
      <a href="/tournament/{{ tournament.id }}/create-team/" class="btn-primary">Create Team</a>
      {% endif %}
      <a href="/tournament/{{ tournament.id }}/leaderboard/" class="btn-secondary">Leaderboard</a>
    </div>
  </div>
</div>
{% endblock %}
